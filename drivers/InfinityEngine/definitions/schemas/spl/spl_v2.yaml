name: SPL
version: V2
games: [IWD2]

header:
  fields:

  - name: signature
    type: char_array
    size: 4
    offset: 0x0000

  - name: version
    type: char_array
    size: 4
    offset: 0x0004

  - name: spell_name_unidentified
    type: dword
    size: 4
    offset: 0x0008

  - name: spell_name_identified
    type: dword
    size: 4
    offset: 0x000c

  - name: completion_sound
    type: resref
    size: 8
    offset: 0x0010

  - name: flags
    type: bitmask
    size: 4
    offset: 0x0018
    flags:
      0x00000400: hostile_breaks_invisibility
      0x00000800: no_los_required
      0x00002000: outdoors_only
      0x00004000: simplified_duration
      0x00008000: trigger_contingency
      0x00040000: not_in_combat

  - name: spell_type
    type: enum
    size: 2
    offset: 0x001c
    values:
      0: Special
      1: Wizard
      2: Cleric
      3: Psionic
      4: Innate
      5: Bardsong

  - name: exclusion_flags
    type: dword
    size: 4
    offset: 0x001e

  - name: casting_graphics
    type: word
    size: 2
    offset: 0x0022

  - name: min_level
    type: char
    size: 1
    offset: 0x0024

  - name: primary_type
    type: byte
    size: 1
    offset: 0x0025
    lookup:
      kind: 2da
      file: MSCHOOL.2DA
      file_by_game:
        IWD2: SCHOOL.2DA
      row_mode: index
      column: _row_label

  - name: min_strength
    type: byte
    size: 1
    offset: 0x0026

  - name: secondary_type
    type: char
    size: 1
    offset: 0x0027
    lookup:
      kind: 2da
      file: MSECTYPE.2DA
      row_mode: index
      column: _row_label

  - name: min_strength_bonus
    type: byte
    size: 1
    offset: 0x0028

  - name: usability_1
    type: byte
    size: 1
    offset: 0x0029

  - name: min_int
    type: byte
    size: 1
    offset: 0x002a

  - name: usability_2
    type: byte
    size: 1
    offset: 0x002b

  - name: min_dex
    type: byte
    size: 1
    offset: 0x002c

  - name: usability_3
    type: byte
    size: 1
    offset: 0x002d

  - name: min_wis
    type: byte
    size: 1
    offset: 0x002e

  - name: usability_4
    type: byte
    size: 1
    offset: 0x002f

  - name: min_con
    type: word
    size: 2
    offset: 0x0030

  - name: min_cha
    type: word
    size: 2
    offset: 0x0032

  - name: spell_level
    type: dword
    size: 4
    offset: 0x0034

  - name: stack_amount
    type: word
    size: 2
    offset: 0x0038

  - name: spellbook_icon_the_engine_replaces_the_last_character_of_this_filename_with_a_c
    type: resref
    size: 8
    offset: 0x003a

  - name: lore_to_id
    type: word
    size: 2
    offset: 0x0042

  - name: ground_icon
    type: resref
    size: 8
    offset: 0x0044

  - name: weight
    type: dword
    size: 4
    offset: 0x004c

  - name: spell_description_unidentified
    type: dword
    size: 4
    offset: 0x0050

  - name: spell_description_identified
    type: dword
    size: 4
    offset: 0x0054

  - name: description_icon
    type: resref
    size: 8
    offset: 0x0058

  - name: enchantment
    type: dword
    size: 4
    offset: 0x0060

  - name: offset_to_extended_header
    type: dword
    size: 4
    offset: 0x0064

  - name: count_of_extended_header
    type: word
    size: 2
    offset: 0x0068

  - name: offset_to_feature_block
    type: dword
    size: 4
    offset: 0x006a

  - name: index_into_casting_feature_blocks
    type: word
    size: 2
    offset: 0x006e

  - name: count_of_casting_feature_block
    type: word
    size: 2
    offset: 0x0070

  - name: duration_modifier
    type: byte
    size: 1
    offset: 0x0072

  - name: duration_modifier_2
    type: byte
    size: 1
    offset: 0x0073

  - name: unknown
    type: bytes
    size: 14
    offset: 0x0074

extended_header:
  offset_field: offset_to_extended_header
  count_field: count_of_extended_header
  fields:

  - name: spell_form
    type: char
    size: 1
    offset: 0x0000

  - name: unknown
    type: char
    size: 1
    offset: 0x0001

  - name: location
    type: word
    size: 2
    offset: 0x0002

  - name: memoried_icon_the_engine_replaces_the_last_character_of_this_filename_with_a_b
    type: resref
    size: 8
    offset: 0x0004

  - name: target
    type: char
    size: 1
    offset: 0x000c

  - name: target_number
    type: char
    size: 1
    offset: 0x000d

  - name: range
    type: word
    size: 2
    offset: 0x000e

  - name: level_required
    type: word
    size: 2
    offset: 0x0010

  - name: casting_time
    type: word
    size: 2
    offset: 0x0012

  - name: times_per_day
    type: word
    size: 2
    offset: 0x0014

  - name: dice_sides
    type: word
    size: 2
    offset: 0x0016

  - name: dice_thrown
    type: word
    size: 2
    offset: 0x0018

  - name: enchanted
    type: word
    size: 2
    offset: 0x001a

  - name: damage_type
    type: enum
    size: 2
    offset: 0x001c
    values:
      0: None
      1: Piercing/Magic
      2: Blunt
      3: Slashing
      4: Ranged
      5: Fists
      6: Piercing/Blunt (more)
      7: Piercing/Slashing (more)
      8: Blunt/Slashing (less)
      9: Blunt missile

  - name: count_of_feature_block
    type: word
    size: 2
    offset: 0x001e

  - name: index_into_feature_blocks
    type: word
    size: 2
    offset: 0x0020

  - name: charges
    type: word
    size: 2
    offset: 0x0022

  - name: charge_depletion_behvaiour
    type: word
    size: 2
    offset: 0x0024

  - name: projectile
    type: word
    size: 2
    offset: 0x0026
    lookup:
      kind: ids
      file: MISSILE.IDS

feature_block:
  offset_field: offset_to_feature_block
  count_field: count_of_feature_block
  fields:

  - name: opcode_number
    type: word
    size: 2
    offset: 0x0000

  - name: target_type
    type: enum
    size: 1
    offset: 0x0002
    values:
      0: None
      1: Self (pre-projectile)
      2: Pre-target
      3: Party
      4: Everyone (including party)
      5: Everyone (excluding party)
      6: Caster group
      7: Target group
      8: Everyone except self
      9: Self (post-projectile)

  - name: power
    type: char
    size: 1
    offset: 0x0003

  - name: parameter_1
    type: dword
    size: 4
    offset: 0x0004

  - name: parameter_2
    type: dword
    size: 4
    offset: 0x0008

  - name: timing_mode
    type: enum
    size: 1
    offset: 0x000c
    values:
      0: Duration
      1: Permanent
      2: While equipped
      3: Delayed duration
      4: Delayed
      5: Delayed (transforms to 8)
      6: Duration?
      7: Permanent?
      8: Permanent (unsaved)
      9: Permanent (after Death)
      10: Trigger
      4096: Absolute duration

  - name: resistance
    type: enum
    size: 1
    offset: 0x000d
    values:
      0: Nonmagical
      1: Can be dispelled/Affected by resistance
      2: Cannot be dispelled/Ignores resistance
      3: Can be dispelled/Ignores resistance

  - name: duration
    type: dword
    size: 4
    offset: 0x000e

  - name: probability_1
    type: char
    size: 1
    offset: 0x0012

  - name: probability_2
    type: char
    size: 1
    offset: 0x0013

  - name: resource
    type: resref
    size: 8
    offset: 0x0014

  - name: dice_thrown
    type: dword
    size: 4
    offset: 0x001c

  - name: dice_sides
    type: dword
    size: 4
    offset: 0x0020

  - name: saving_throw_type
    type: bitmask
    size: 4
    offset: 0x0024
    flags:
      0x00000001: unknown
      0x00000002: fortitude
      0x00000004: reflex
      0x00000008: will

  - name: saving_throw_bonus
    type: dword
    size: 4
    offset: 0x0028

  - name: unknown
    type: dword
    size: 4
    offset: 0x002c
