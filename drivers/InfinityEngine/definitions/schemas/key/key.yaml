name: KEY
version: V1
games: [BG1, BG2, IWD, IWD2, PST, BGEE, BG2EE, IWDEE, PSTEE]

header:
  fields:

  - name: signature
    type: char_array
    size: 4
    offset: 0x0000

  - name: version
    type: char_array
    size: 4
    offset: 0x0004

  - name: count_bif_entries
    type: dword
    size: 4
    offset: 0x0008

  - name: count_of_resource_entries
    type: dword
    size: 4
    offset: 0x000c

  - name: bif_entries_offset   # fixed typo
    type: dword
    size: 4
    offset: 0x0010

  - name: resource_entries_offset
    type: dword
    size: 4
    offset: 0x0014

bif_entries:
  offset_field: bif_entries_offset
  count_field: count_bif_entries
  fields:

  - name: length_of_bif_file
    type: dword
    size: 4
    offset: 0x0000

  - name: offset_from_start_to_filename
    type: dword
    size: 4
    offset: 0x0004

  - name: length_of_filename
    type: word
    size: 2
    offset: 0x0008

  - name: filename
    type: pointer_string
    offset_ref: offset_from_start_to_filename
    length_ref: length_of_filename

  - name: file_location
    type: bitmask   # interpret flags instead of plain number
    size: 2
    offset: 0x000a
    flags:
      0x0001: is_in_data
      0x0002: is_in_cache
      0x0004: is_on_cd1
      0x0008: is_on_cd2
      0x0010: is_on_cd3
      0x0020: is_on_cd4
      0x0040: is_on_cd5
      0x0080: is_on_cd6

resource_entries:
  offset_field: resource_entries_offset
  count_field: count_of_resource_entries
  fields:

  - name: resource_name
    type: resref
    size: 8
    offset: 0x0000

  - name: resource_type
    type: word
    size: 2
    offset: 0x0008

  - name: resource_locator
    type: bitfield
    size: 4
    offset: 0x000a
    bitfields:
      resource_index:
        mask: 0x3FFF
        shift: 0
      tileset_index:
        mask: 0x3F
        shift: 14
      bif_index:
        mask: 0xFFF
        shift: 20