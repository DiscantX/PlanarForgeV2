  # IESDP documents per-class/per-level spell blocks starting at 0x03ba.
  # In sampled IWD2 CRE files each offset/count pair points to a mixed block:
  # one 8-byte memorization header followed by N 16-byte spell entries.
  # The current schema model cannot express that shape, so the header tables
  # are preserved here as raw bytes instead of modeling invalid sections.
  - name: spell_offset_table
    type: bytes
    size: 252
    offset: 0x03ba

