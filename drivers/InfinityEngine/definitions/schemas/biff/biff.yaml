name: BIFF
version: V1
games: [BG1, BG2, IWD, IWD2, PST, BGEE, BG2EE, IWDEE, PSTEE]

header:
  fields:

  - name: signature
    type: char_array
    size: 4
    offset: 0x0000

  - name: version
    type: char_array
    size: 4
    offset: 0x0004

  - name: file_entries
    type: dword
    size: 4
    offset: 0x0008

  - name: tileset_entries
    type: dword
    size: 4
    offset: 0x000c

  - name: file_entries_offset
    type: dword
    size: 4
    offset: 0x0010

file_entries:
  offset_field: file_entries_offset
  count_field: file_entries
  
  fields:

  - name: resource_locator
    type: dword
    size: 4
    offset: 0x0000

  - name: offset
    type: dword
    size: 4
    offset: 0x0004

  - name: size_of_this_resource
    type: dword
    size: 4
    offset: 0x0008

  - name: type_of_this_resource
    type: word
    size: 2
    offset: 0x000c

  - name: unknown
    type: word
    size: 2
    offset: 0x000e
