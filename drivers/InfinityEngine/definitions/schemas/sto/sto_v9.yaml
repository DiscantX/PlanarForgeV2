name: STO
version: V9
games: [IWD2]

header:
  fields:

  - name: signature
    type: char_array
    size: 4
    offset: 0x0000

  - name: version
    type: char_array
    size: 4
    offset: 0x0004

  - name: type
    type: dword
    size: 4
    offset: 0x0008

  - name: name
    type: strref
    size: 4
    offset: 0x000c

  - name: flags
    type: bitfield
    bitfields:
      user_can_buy: { shift: 0, mask: 0x1 }
      user_can_sell: { shift: 1, mask: 0x1 }
      user_can_identify: { shift: 2, mask: 0x1 }
      user_can_steal: { shift: 3, mask: 0x1 }
      user_can_donate: { shift: 4, mask: 0x1 }
      user_can_purchase_cures: { shift: 5, mask: 0x1 }
      user_can_purchase_drinks: { shift: 6, mask: 0x1 }
      unknown_7: { shift: 7, mask: 0x1 }
      unknown_8: { shift: 8, mask: 0x1 }
      store_quality: { shift: 9, mask: 0x3 }
      unknown_11: { shift: 11, mask: 0x1 }
      buy_fenced_goods: { shift: 12, mask: 0x1 }
    size: 4
    offset: 0x0010

  - name: sell_markup
    type: dword
    size: 4
    offset: 0x0014

  - name: buy_markup
    type: dword
    size: 4
    offset: 0x0018

  - name: depreciation_rate
    type: dword
    size: 4
    offset: 0x001c

  - name: chance_of_steal_failure
    type: word
    size: 2
    offset: 0x0020

  - name: unknown_1
    type: word
    size: 2
    offset: 0x0022

  - name: unknown_2
    type: bytes
    size: 8
    offset: 0x0024

  - name: offset_to_items_purchased
    type: dword
    size: 4
    offset: 0x002c

  - name: count_of_items_in_items_purchased
    type: dword
    size: 4
    offset: 0x0030

  - name: offset_to_items_for_sale
    type: dword
    size: 4
    offset: 0x0034

  - name: count_of_items_for_sale
    type: dword
    size: 4
    offset: 0x0038

  - name: lore
    type: dword
    size: 4
    offset: 0x003c

  - name: id_price
    type: dword
    size: 4
    offset: 0x0040

  - name: rumours
    type: resref
    size: 8
    offset: 0x0044

  - name: offset_to_drinks
    type: dword
    size: 4
    offset: 0x004c

  - name: count_of_drinks
    type: dword
    size: 4
    offset: 0x0050

  - name: rumours_temple
    type: resref
    size: 8
    offset: 0x0054

  - name: room_flags
    type: bitmask
    flags:
      0x00000001: peasant
      0x00000002: merchant
      0x00000004: noble
      0x00000008: royal
    size: 4
    offset: 0x005c

  - name: peasant_room_price
    type: dword
    size: 4
    offset: 0x0060

  - name: merchant_room_price
    type: dword
    size: 4
    offset: 0x0064

  - name: noble_room_price
    type: dword
    size: 4
    offset: 0x0068

  - name: royal_room_price
    type: dword
    size: 4
    offset: 0x006c

  - name: offset_to_cures
    type: dword
    size: 4
    offset: 0x0070

  - name: count_of_cures
    type: dword
    size: 4
    offset: 0x0074

  - name: unknown_3
    type: bytes
    size: 36
    offset: 0x0078

  - name: capacity
    type: short
    size: 2
    offset: 0x009c

  - name: unknown_4
    type: bytes
    size: 82
    offset: 0x009e

items_for_sale:
  offset_field: offset_to_items_for_sale
  count_field: count_of_items_for_sale

  fields:
  - name: itm
    type: resref
    size: 8
    offset: 0x0000

  - name: expiration_time
    type: word
    size: 2
    offset: 0x0008

  - name: quantity_1
    type: word
    size: 2
    offset: 0x000a

  - name: quantity_2
    type: word
    size: 2
    offset: 0x000c

  - name: quantity_3
    type: word
    size: 2
    offset: 0x000e

  - name: flags
    type: bitmask
    flags:
      0x00000001: identified
      0x00000002: unstealable
      0x00000004: stolen
      0x00000008: has_lore_requirement
    size: 4
    offset: 0x0010

  - name: in_stock
    type: dword
    size: 4
    offset: 0x0014

  - name: infinite_supply
    type: dword
    size: 4
    offset: 0x0018

drinks_for_sale:
  offset_field: offset_to_drinks
  count_field: count_of_drinks
  fields:

  - name: rumour
    type: resref
    size: 8
    offset: 0x0000

  - name: drink
    type: strref
    size: 4
    offset: 0x0008

  - name: price
    type: dword
    size: 4
    offset: 0x000c

  - name: alcoholic_strength
    type: dword
    size: 4
    offset: 0x0010

cures_for_sale:
  offset_field: offset_to_cures
  count_field: count_of_cures

  fields:
  - name: spl
    type: resref
    size: 8
    offset: 0x0000

  - name: price
    type: dword
    size: 4
    offset: 0x0008

items_purchased:
  offset_field: offset_to_items_purchased
  count_field: count_of_items_in_items_purchased
  fields:
  - name: item_type
    type: dword
    size: 4
    offset: 0x0000
    lookup:
      kind: ids
      file: ITEMTYPE.IDS
